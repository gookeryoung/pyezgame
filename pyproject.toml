[build-system]
requires = ["scikit-build-core>=0.10", "pybind11>=2.13"]
build-backend = "scikit_build_core.build"

[project]
name = "gameui"
version = "0.1.2"
description = "Python bindings for GameLib - a beginner-friendly game development library"
requires-python = ">=3.8"
dependencies = []

[project.scripts]
gameui = "gameui.cli:main"

[tool.scikit-build]
cmake.build-type = "Release"
wheel.packages = ["gameui"]

[tool.basedpyright]
exclude                           = ["**/.git", "**/.venv", "**/__pycache__", "**/build", "**/dist"]
include                           = ["src"]
pythonVersion                     = "3.8"
reportImplicitStringConcatenation = "error"
reportMissingTypeStubs            = "none"
reportUnusedCallResult            = "warning"
typeCheckingMode = "recommended"

[[tool.uv.index]]
url = "https://mirrors.aliyun.com/pypi/simple/"
default = true

[dependency-groups]
dev = [
    "coverage>=7.6.1",
]
