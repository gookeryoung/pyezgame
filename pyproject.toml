[build-system]
requires = ["scikit-build-core>=0.10", "pybind11>=2.13"]
build-backend = "scikit_build_core.build"

[project]
name = "pyezgame"
version = "0.1.2"
description = "Python bindings for GameLib - a beginner-friendly game development library"
requires-python = ">=3.8"
dependencies = []

[project.scripts]
pyezgame = "pyezgame.cli:main"

[tool.scikit-build]
cmake.build-type = "Release"
wheel.packages = ["pyezgame"]

[tool.basedpyright]
exclude                           = ["**/.git", "**/.venv", "**/__pycache__", "**/build", "**/dist"]
include                           = ["src"]
pythonVersion                     = "3.8"
reportImplicitStringConcatenation = "error"
reportMissingTypeStubs            = "none"
reportUnusedCallResult            = "warning"
typeCheckingMode = "recommended"

[[tool.uv.index]]
url = "https://mirrors.aliyun.com/pypi/simple/"
default = true

[dependency-groups]
dev = [
    "coverage>=7.6.1",
]



[tool.ruff]
line-length    = 88
src            = ["src"]
target-version = "py38"
unsafe-fixes   = true

[tool.ruff.lint]
select = [
    # 核心
    "B",
    "C4",
    # 更简洁的推导式写法
    "E",
    "F",
    "I",
    "PERF", # 性能优化提示
    "SIM",  # 简化不必要的复杂代码
    "T10",  # 禁止调试代码提交 (如 pdb)
    "T20",  # 在生产代码中禁止/警告 print
    "TRY",  # 更好的异常处理实践
    "UP",   # 提示使用新语法（对3.8+项目友好）
    # 新增 - 代码清晰度
    "A",
    "COM",
    "ERA",
    "FBT",
    # 新增 - 类型安全
    "ANN",
    "BLE",
    "RUF",
    "SLOT",
    # 新增 - 导入规范
    #"TID",
    #"ICN",
    # 新增 - 安全
    "DTZ",
    "LOG",
    "S",
    # 新增 - 命名
    # "N"
]