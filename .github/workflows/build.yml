name: Build & Publish

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip (in-container)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: linux-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: linux-pip-

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ENVIRONMENT: "PIP_CACHE_DIR=/host/home/runner/.cache/pip"

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: wheelhouse/*.whl

  build-windows:
    name: Windows wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: windows-pip-

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: wheelhouse/*.whl

  build-macos:
    name: macOS wheels
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: macos-brew-${{ hashFiles('pyproject.toml') }}
          restore-keys: macos-brew-

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=15.0"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
