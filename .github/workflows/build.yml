name: Build & Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            wheelhouse/*.whl
            dist/*.tar.gz

  build-windows:
    name: Windows wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: wheelhouse/*.whl

  build-macos:
    name: macOS wheels
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.23

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
