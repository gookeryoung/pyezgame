name: pyezgame CI Build

# ── 全局变量 ──
variables:
  - key: PIP_INDEX_URL
    value: 'https://mirrors.aliyun.com/pypi/simple/'
  - key: PIP_TRUSTED_HOST
    value: 'mirrors.aliyun.com'
  - key: PIP_CACHE_DIR
    value: '/root/.cache/pip'
  # cibuildwheel 内部构建也使用国内源
  - key: CIBW_ENVIRONMENT
    value: 'PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/ PIP_TRUSTED_HOST=mirrors.aliyun.com'

sources:
  my_repo:
    type: codeup
    name: pyezgame
    endpoint: 'https://codeup.aliyun.com/678008df52027c9a54e70902/pypi/pyezgame.git'
    branch: main
    triggerEvents:
      - push
      - tagPush
    certificate:
      type: serviceConnection
      serviceConnection: x9jakytjkjrnm8sb

stages:
  lint_stage:
    name: 代码检查阶段
    jobs:
      lint_job:
        name: Ruff 代码检查
        runsOn: public/cn-beijing
        caches:
          - path: /root/.cache/pip
            key: pip-lint-${{hashFiles('pyproject.toml')}}
        steps:
          lint_step:
            step: PythonBuild
            name: Ruff Lint
            with:
              pythonVersion: "3.12"
              run: |
                pip install ruff
                ruff check .

  build_stage:
    name: 构建阶段
    jobs:
      build_linux_job:
        name: Linux wheels 构建
        runsOn: public/cn-beijing
        caches:
          - path: /root/.cache/pip
            key: pip-build-${{hashFiles('pyproject.toml')}}
          - path: /root/.cache/cibuildwheel
            key: cibw-${{hashFiles('pyproject.toml')}}
        steps:
          build_step:
            step: PythonBuild
            name: cibuildwheel 构建
            with:
              pythonVersion: "3.12"
              run: |
                pip install "cibuildwheel==2.23.*"
                cibuildwheel --output-dir wheelhouse
          sdist_step:
            step: PythonBuild
            name: 构建 sdist
            with:
              pythonVersion: "3.12"
              run: |
                pip install build
                python -m build --sdist --outdir wheelhouse
          upload_step:
            step: ArtifactUpload
            name: 上传构建产物
            with:
              uploadType: flowPublic
              artifact: dist-linux
              filePath:
                - wheelhouse/

  test_stage:
    name: 测试阶段
    jobs:
      test_job:
        name: 单元测试
        runsOn: public/cn-beijing
        caches:
          - path: /root/.cache/pip
            key: pip-test-${{hashFiles('pyproject.toml')}}
        steps:
          install_deps_step:
            step: PythonBuild
            name: 安装系统依赖
            with:
              run: |
                yum install -y epel-release || true
                yum install -y SDL2-devel SDL2_image-devel SDL2_ttf-devel SDL2_mixer-devel || \
                dnf install -y epel-release && \
                dnf config-manager --set-enabled powertools || dnf config-manager --set-enabled crb || true && \
                dnf install -y SDL2-devel SDL2_image-devel SDL2_ttf-devel SDL2_mixer-devel
          test_step:
            step: PythonBuild
            name: pytest 测试
            with:
              pythonVersion: "3.12"
              run: |
                pip install -e ".[test]"
                pytest tests -x --import-mode=importlib
